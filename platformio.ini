; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; NODUL 1: TERMOSTAT (Emitator)

[env:atmega328p_xplained]
platform = atmelavr
board = ATmega328P
framework = arduino
upload_protocol = custom
upload_command = C:\Users\mihne\.platformio\packages\tool-avrdude\avrdude.exe -C C:\Users\mihne\.platformio\packages\tool-avrdude\avrdude.conf -p atmega328p -c xplainedmini_isp -P usb -e -U flash:w:$SOURCE:i
lib_deps =
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.3
    adafruit/DHT sensor library @ ^1.4.4
    adafruit/Adafruit Unified Sensor @ ^1.1.9
    paulstoffregen/Encoder @ ^1.4.2
    nrf24/RF24 @ ^1.4.8

build_src_filter = -<*> +<termostat.cpp>


; NODUL 2: Heater
[env:uno_receptor]
platform = atmelavr
board = uno
framework = arduino
lib_deps =
    nrf24/RF24 @ ^1.4.8
build_src_filter = -<*> +<heater.cpp>